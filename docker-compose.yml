version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: primetrade_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: primetrade_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/primetrade_db?schema=public
      JWT_ACCESS_SECRET: primetrade_access_secret_change_in_production
      JWT_REFRESH_SECRET: primetrade_refresh_secret_change_in_production
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    command: >
      sh -c "npx prisma migrate deploy && node src/app.js"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primetrade_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
